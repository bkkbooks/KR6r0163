body:
  text: 古吳沙門智旭隨筆楚中有一生員心迹正直值冥府缺第七殿上帝命暫主之每隔數日則入冥理事但正坐簡閱文簿不勞簽判而隨彼前人行業罪福異趣每見有自上刀山劍樹者輒使左右救之愈救愈上竟莫能挽也一日閱簿見其妻有一罪款云盜鄰雞一隻連毛重一斤十二兩遂折而識之回陽詰問其妻妻尚抵謾彼述冥間所見質之乃首曰鄰雞食所曬物失手誤打令死懼鄰婦詬厲故尚藏未發耳因取出秤之斤兩不爽相對驚異遂以死雞并價償謝鄰人未幾復入冥簡視前簿折痕如故而罪欵已無影迹矣江西養智禪人說乙卯科浙省解元馮銓因會試入燕都有一老人止生二女仰銓為名士也拜而托之銓下第歸帶至揚州竟潛賣與娼家媒來取二女二女詬為誣誑媒出詮手書示之二女驚哭遂投水死是夜詮妻夢二散髮女子從溝道入一鬼從之手持虎頭牌有速拿馮詮四字驚異而醒未幾詮安隱歸家妻相接甚歡詮問曰我已下第胡故歡甚妻默不言再三逼問乃述前夢詮正經行樓上聞說夢畢身即戰慄從樓墮下七竅流血悶絕於地家人急扶起喚醒之乃具述負心事言畢遂死舟中嘉興人說蘇州庠生陸穀字戩夫曩與予同參寒灰湛明諸公後專精禪學頗有省發益復沉靜庚午歲暮乘小舟有所往忽遇糧船上六人借登其舟舟遂覆六人皆無恙穀竟溺死家屬償其修行無靈驗乃示夢曰余往世曾以一方便害此六人今償夙債非修行咎也設不修行報當更劇矣洞庭西山蔡坦如居士妻甚賢良持齋念佛放生然燈密作眾福不求人知既病劇謂坦如曰死固不須擇日但世人俗見謂修行人乃惡日死亦所不便幸為擇日明日吉乎答云不吉後日吉乎答云亦不吉乃曰吾不能更待矣今日吉乎答云今日頗吉因即命取水澡浴集親友念佛正坐合掌而逝吳江太湖灘有一老人生平惟喜念佛放生別無所知每行路時拾灘頭螄蜆放入水中雖極冗不顧平日遇有生命輒解衣割食買放曾無退懈忽一日謂家人曰吾當西逝可集親友送我因集眾念佛安然坐逝異香經宿不散吳江鑒空師說杭州北關羅四造大悲像鑄鏡光有老嫗以一小鏡相助羅愛其古存之初鑄僅成四邊二鑄僅成半鏡三鑄中缺一孔與所留古鏡大小正等乃出所留鏡投爐且云此鑄若成吾當懺悔若復不成非吾咎矣鑄果立就於是復捐貲禮懺今其鏡現在龍居永慶寺懺壇姑蘇陽山西王象橋有居民夫婦每至稻熟時輒於鄰田中搣取禾穗以自益忽一日亡父母附於女身大詬曰汝盜鄰家穀冥府乃督我搣己田中穗償之兩手皆傷不勝苦痛汝何害我至此耶又一居民植菜有鄰人齊根截去一疇彼忍而不較菜乃從根復生茂盛倍常次夜鄰又截去一疇彼不復堪痛加詛罵此疇所留菜根倍多竟枯腐無復生者又一居民索陳債負債者嫌其太迫即口牴之彼含恨言如何負我物而不肯償我必為毒蛇噬之未幾患黃病展轉牀席者年餘負債人聞其病篤因念云我本無心負彼因彼態太惡故謾相牴耳今聞其抱病我當償之乃備一本一利并禮物四盒往謝彼人喜甚相留對飲飲醉忽吐一蛇厥病遂愈杭州鄉民有田數畒界在祝鄉䆠田中祝以勢力迫取之民無可訴誓來生作蛇相螫遂得重病命匠作棺留一孔穴匠問知其故以白於祝祝悔悟輿民至家還其田契并與養病之資民感泣即吐出一蛇霍然起走還家王元建居士親知其事杭州于行素妻重病三載有餘勢在必死一夜夢綵雲擁菩薩到其庭歡喜驚醒適值雲棲大師到城于率諸眷屬固求大師光臨師命先作經懺道場四日至末日乃往焉病者恍如夢中所見遂愈天啟初年吳江桑葉大貴有居民養蠶數筐因計成繭所得之利不如賣葉利多遂埋蠶載葉至湖州鬻之舟過太湖有大鯉躍入舟中民取而藏之頭艙既至葉店主人見葉上有血詰問其故答曰此魚血也魚尚在頭艙試取看之則儼然一人頭矣共相驚駭更迫問之答曰實無他故我自埋蠶賣葉欲多取利耳因同眾人至埋蠶處掘地視之復得一死屍與頭相合廼鳴於官竟擬死罪嗟乎業報為蠶不免煑繭之苦亦甚慘矣況為微利而活埋之并使不得盡一期之生人心安在宜其報應之甚速也余母舅金赤城守贑州因入覲歸家夏感瘧症隱几假𥧌夢公署役人環列其左出家緇流環列其右復一老人語曰若本從出家中來今能回頭仍向此道乎能則尚可送汝老母不能則老母反送汝矣舅因思吾母已年八十有四豈當反令其送我耶即應聲曰我當回頭聲未訖役人遂散乃隨緇眾梵唄而行忽動孤寂之感悲悔而醒異時在陽山墓廬為余言之但以䆠情甚熱仍蒞贑州未幾陞兖東兵道歸家病三四日而卒竟使八旬餘之老母淚眼欲枯嗚呼蠅頭蝸角迷人心志如此世出世法兩皆負墮亦可為青雲路上人作永鑒也姑蘇南濠街有一人常作陰隷每數日輒往直班鄰有一人語曰能帶我至陰間遊戲乎隷曰可汝但靜臥室中勅家人勿開戶我當帶汝去仍送汝回隣人如命臥室中隷即攝其魂同至府城隍廟前囑令住石牌樓下相待自乃持文書入中庭去鄰人待久生厭倦心見一大車從西過東載四娼女并二男子中一娼女原有舊情以手招之遂登車同去隷出廟覓鄰人不見轉問旁人知登車去乃回陽急至傅門外一居民家見有新產小猪七頭其一即鄰人也以手擲之猪斃而魂忽不見次於田岸見大赤蛇仰臥即知鄰人所變乃打殺之揑其魂歸房擲醒因問曰汝同我遊陰府頗適意乎答曰汝初置我於廟前石牌樓下入廟經久不出我方厭倦幸舊識娼女邀我出傅門外同至一舍相與飲食歡樂忽有人奪我食打我項我怒而出外困而偃息復聞人呼曰赤蛇赤蛇以手攫我我便驚醒有何樂乎隸笑語其故黃洪江親聞其事乃發心學道洪江亦予在家時善友泉州莊奇顯癸丑科榜眼年少嗜酒忽一日飲於承天寺醉後往藏經所見有法師講大佛頂經遂大怒取案上經擲地以脚踏之又仆韋䭾像於地後數月以脚踢一廝誤中柱上脚指破裂成異瘡漸腫至身楚痛異常見韋駄詰責而死泉州張翰冲丙辰進士也任金壇知縣將行取一日坐堂忽有緇流徑詣公堂語曰我與汝前生道友見汝有難特來救汝汝可罷官同入山學道不唯免難且出生死張以為誕緇遂歷指其少時事數種皆妻拏所不知者張乃駭諤欲如其言竟為妻子所阻緇尋別去張赴京考選甫至都門脚忽生異癰著靴不能脫割靴調理不愈而死晉江許兆馨戊午舉人往福寧州謁本房座師偶過尼菴悅一少尼遂以官勢脅之強汙焉次日忽自嚙舌兩斷而死晉江王某以文名諸生間擕酒飲承天寺入藏經堂見少年沙彌某端坐閱經強令飲酒沙彌不從復摟抱調弄之歸家三日忽掌口自罵家人不知所謂半日嚙舌而死孝豐縣監生楊龔所買鳥銃八把養獵狗數隻隨處損傷物命一日欲往庄取稻合家人俱得夢云十年造業惡報至矣楊不信復帶銃到庄見野雞以銃打之誤中己頭破腦而死泉州徐氏女名三姐年十六未嫁忽得病父母為覓醫女垂淚告父母曰吾必死無用醫矣蓋吾前生為某家婦夫寵一婢吾以妬故謀殺之今在冥官處訴我當往償之不得逭也翼日遂死泉州徐氏女名悌姐嫁後生數子產中多食鷄所殺鷄頗眾後仍於產時得病見羣鷄索命而死晉江姚某其表兄徐肖浯因年荒捐百金賑饑托姚經理其事姚匿十數金肥己後數日得病自罵曰徐托汝賑饑安得侵匿致餓死者不少今取汝償命遂斃後二子亦皆餓死泉州徐氏女名細嬰年七歲得疳積病埀死其父雨海為鳴磬高聲念佛送之息已絕忽再甦因為延尼僧誦金剛般若經百二十卷女安隱若無病者舉家皆謂病愈女獨向父曰兒暫假數日聽經完去耳經完乃逝泉州有賴姓者家巨富喜害生命家中開一小池以鐵網羅其上下養鰍鱔魚鼈之類用供不時飲食後得病將死諸子羅列牀前賴忽不見徧索不得乃見在小池鐵網中則已死矣晉江有一無賴忘其名恒以殺狗為業在興泉道街門邊溝側屠狗無數忽一日自伏溝側作狗鳴數日乃斃神宗時有一南道名王萬祚管下巡江居官最清廉而性頗嚴急捶楚之下傷命良多忽得病衙中冤鬼數百前後呼叫同僚諸御史往問之無不見聞者五皷王竟不起南安縣山間有居民夜起見鄰舍有一人驅一人入其門其人不肯入且曰吾僅欠渠銀三分何得便入驅者以杖打之遂入居民頗以為怪明早詢之則鄰舍已生一猪民復疑猪所直不止三分未幾猪墮圊死竟有一人以三分銀買之民疑乃解孝豐靈巖寺釋自謙未出家時有友勞振宇係江右人在遞舖灘賣鱔麵歲殺鱔數千斤後移居德清縣仍習前業一日以滾湯煑鱔若有人執其手不能蓋鍋羣鱔帶沸湯跳起攢頭匝面咬定不放振宇號慟萬狀須臾鱔死方脫不十日振宇尋死釋性戒俗姓萬有弟萬七不事他業專用繩索弔諸鳥及狐狸兔犬之類屢勸改業不從凡十餘年後一夜臥牀上以朽繩自纏頸人莫知之次早不起方啟戶視之已自斃矣神宗時應天巡撫周孔教以新陞侍郎過家中有屬官數人皆修書差隷往謝舉薦隷在其門候未得即通忽見一承差持單紅帖有侍生石星拜五字門者急為傳進周方晏坐見之大驚已而帖及承差俱不見周遂病劇子孫環立又見白布包首者三十餘人突入臥室訶之則各以手持己頭示人蓋斷頭鬼也周遂卒考其故石向為兵部尚書時周為御史劾之下獄論死而三十餘人皆周為巡撫時以賊情誤殺者也台州府松門衛有一居民於崇禎辛未年五月盜檀香大士像一軀至天台縣欲售於鄉紳張大素張許價六金民嫌其少遂欲劈像作香鬻之時一皂役先一夜得夢女人稱苦求救彼正妻死未久疑是索薦乃往西門店中買祭物忽聞店內劈像聲急趨入視之恍悟前夢因扭解至捕官所其房亦於先一夜得夢遂苦鞫之自首從松門盜來即申之縣令以像歸張宅修理供養其人未幾死於獄中高明寺沙彌岳弘管庫事侵尅大眾無所不至每於庫中私造飲食偏眾獨享并偷常住豆米等以供己用甫及一年於元旦夜夢關帝割其舌去至初四即大病濵死乃惶怖無地盡賣衣單求眾懺悔告辭庫司病始漸愈高明寺又一沙彌靈灝素不持戒有瑞光上座率清眾各出己資結大悲懺期灝亦預焉正在期中仍私行不軌遂夢關帝截其首去次日即嘔血不已重病數月而死佛日寺釋實相中年出家惟勤修苦行炤管常住為事隨作務隨念佛所得即施不留餘貲不與人諍亦無怒容壬申秋忽一日語人曰吾明日當西逝乃借雲棲一老人坐龕次日洗浴剃髮髮未竟已坐脫矣安吉州龍溪菴釋了空延覺海法主講法華經因迎送之禮殷重里人妬之誘一無賴莫姓者打法主一拳眾僧忿甚熟打莫濵絕里人乘機欲詐菴中鳴官看驗身無小傷需食更甚官遂不能擬罪逮輿歸俗舍則徧身皆損飲食俱廢半年後脇下尚流膿血久久方愈信伽藍護法之力不可思議云癸酉春日過菴中釋隱空親說世廟時吳城鄉紳陸俸貪洞庭山西湖寺風水之勝力謀吞噬因本山鄒陸二氏極相抗訟不遂厥志乃放火焚殿殿有古沉香觀音像焚時香氣遠徹後俸得奇疾渾身癢發滾水灌之次第爛盡乃斃同謀諸人並感惡報神廟時吳城鄉紳毛堪侵天池寺作墓將毀石佛殿為穴天正晴朗忽發厲雷擊碎牌樓堪懼因不毀此殿留一二香火僧居之然大剎已廢其年子女孫媳等俱死後竟絕嗣楓橋有一豪民素行無賴恐被按院訪察乃詐現善相持珠念佛戒酒斷牌諸惡黨亦翕然從化稱之為師而實私行非法仍造眾惡但所言禍福皆悉靈驗利養日盛如此年餘忽自思曰我本無真心修行尚感此善報信是佛法不虗因發真心覓一好師受三歸五戒是後所言禍福百無一驗利養遂絕出怨聲曰我向以詐偽修行反多利養今真心學道更見坎坷佛法豈有實效哉悶而假寐見有人告之曰汝莫怪我汝向來詐偽虗誑妄談禍福我輩得以互相佐助今汝返邪歸正我輩不復能相親近故令汝無聊耳釋慈含與六湛遊野池畔見二水蛭次第變作青蜓至第三水蛭出六湛以草阻之連阻三次忽變作蜈蚣吳城陸湛源居士至洞庭東山吳鳳林家其家為營素供吳母時年九十四歲偶至厨下因問為何營此素供婢云請陸相公又問陸相公年幾何婢云年五十四母驚歎曰渠年五十四便已茹素吾年九十四乃不斷腪耶從今日即當永斷子媳輩力阻之俱不聽仍設香燭請陸居士作證越三年於臘月間忽謂子曰為我請陸先生來子訝問其故答曰吾將遠行子問何往答曰兒何太癡吾已九十七歲安得無去遂徧集子孫輩言別擇次日去次日大雪則云且俟天好方去次日又問天好否婢謬答云今日雪更甚則云更俟天晴未幾見日光炤室乃曰汝等詒我速取我淨衣及取香水來遂起梳洗更衣禮佛并遙禮湛源居士馮几端坐命眷屬同時輕聲念佛以送之許久媳進茶湯則已逝矣姑蘇神堂巷潘奉巖親家渾名盛老鼠有一外甥居鄉間盛往探之甥欲割鷄為饌力阻乃免夜夢亡媳謝曰雞即我後身也吾因不敬三寶墮此異類賴翁慈力昨免刀砧吾七年前曾失一簪在竹筧內可令姑取之盛既醒遂索此雞歸家果於竹筧中尋得舊簪夫妻皆大感發同出家於普陀山後其妻坐逝夫亦善終姑蘇周致和賣藥為業有一次媳歿後附於妹身言曰吾不敬三寶罰作狗身日被厨下人打苦不可言幸速救我父母問曰吾為汝禮慈悲懺法汝得益否答曰正仗懺力將脫難矣父母乃從周家取狗以歸三日而死姑蘇金龍川有一妻弟於南濠開麵坊家人打驢驢忽作人語吾欠汝老主人五金故來効力汝何得鞭我家人大驚以語厥主主取父舊帳簡之果得五金借票一紙因取向驢前碎之語曰吾已免汝驢遂躑躅而斃金龍川又一表弟住滸墅關生一子常病偶父子同臥頃有鬼攝父魂至冥府冥官責云汝欠某人債若干何久不還父答云我不識渠因喚出相認即其子也遂憶前世曾欠債事冥官命曰汝速於三寶中為渠還却一諾而醒其子宛然在牀心倍醒悟後為作福延醫等事計滿本數子隨去世母慟哭之父曰不須哭也此是索舊債者耳備述前夢因相與奉戒修道至今尚存湖州府武康縣公差忘其名路值一男二女尾其後行到鄉宦駱家見三人直入駱門心異之因待至暮不出遂問守門者索人守門人以為誣妄諍打不已聞於主翁翁悟其意命各房查生產事乃見㹀牛新生三牡一壯二牝即喚分差視之三牛毛色與所見三人服色不異方知三人已為牛矣復查其姓名皆欠駱家租米者也後三牛既大力有強弱債多者強債少者弱分毫無爽焉吳城婁門內有姓蔣者自幼喜毀神像崇禎癸酉年拆其父所造火神殿為門房毀神像以為薪然之冬忽頭痛命家人鳴囉集眾眾既集眼珠忽迸出垂於鼻間死而復甦甦而復死口唱冥府所歷諸苦共經四十二日乃絕合城人無不見聞寧國府涇縣水東鄉民忘其姓名居常修善齋僧布施無虗日偶因病暴卒至冥府冥王稽其陽算未盡遣還民乞曰為人多苦不欲更還如是再三王乃問欲作何等答曰願預僧流王驚曰汝福幾何望此高位計汝生平福力祗可作一百戶耳民又固乞設不能為名德沙門求作一燒火僧足矣王曰燒火僧亦萬萬不易作且與汝作一千戶何如民又不欲王曰必欲作燒火僧且回陽間盡其形壽極力修福或可冀耳民遂復甦作福倍前數年乃逝九華空如老人說世廟時休邑大傅瀛有童子名程鎡與同族弟兄捉樹上鵓鳩議定上樹者得其二在樹下者得其一及上樹取得三鳩則樹下者皆取去鎡追奪不肯還遂併取擲殺之夜夢二青衣執牌來捉云有人命事鎡避走約二里許竄入觀音大士殿中見大士儼然在焉二青衣亦追至鎡訴於大士曰我未甞殺人何為捉我二青衣出牌示曰是三鵓鳩相告今須同去理會鎡辯曰鵓鳩不過小禽何足償命況我本與彼約彼人負約致我生忿而擲殺之則罪不獨在我也大士曰鵓鳩若大損犯禾苗則汝殺之其罪稍輕今既初生未甞有過汝今殺之理須償命況彼人雖負約而致之死地者實汝罪也但念汝年幼未有成立因命二青衣寬其限至十二年後某日某時再來追之二青衣奉大士命而散鎡亦遂寤至十二年後鎡商於淞江至期忽自立于秀野橋下而斃大傅瀛程玄偉生一子名本大習儒業費其家產略盡于崇禎辛巳同族兄程天明往姑蘇將本處祖屋賣與其姪得價僅數十金俱被天明扣去空手而回不數日遂抱死止存一女已嫁商山吳宅女歸送殮竟于途中見乃父魂因附其身而歸罵曰天明甚無情誼令我抑而死今已訴于冥王兼告鄉約程宗涵作證矣我又于抗州江干遇故姪程寬寄我要打姪婦吳氏十掌云我止有一子汝何不肯撫養乃起異心耶玄偉聞而訶曰汝在生時破吾家事殆盡今既死去何故尚來作祟答曰吾前世本為商人汝為店主見我財寶謀奪我命我今特來索債但因汝任我揮霍頗快我心故恕汝命耳何得以父禮責我哉淞江海口有朱姓者慣收大猪宰殺為業崇禎己卯年正月間至二鼓時偶起登廁聞人語聲疑以為盜執杖隨聲尋去乃在猪欄中作福建人語一云苦哉我明日必當見殺矣一云汝本當作猪七次今已六次苦將脫矣我當作猪五次今方初次是為苦耳其人本解福建鄉語聞之大駭遂棄惡業又一人宰羊為業亦于己卯年正月間至鄉間買四羊牽歸未至家中僅十里許四羊爭躑躅觸倒此人一羊牽其頭一羊按其兩足二羊上其腹極力抵觸致死已上四事並程智用親見故說神廟時有一士子弱冠即舉進士座師及同年諸友咸器重之其父待之愈嚴稍不如法輒加笞辱一日有同年公請士飲酒士因父責遲遲乃去兼向同年哭愬此情同年大歎服曰甚矣老年伯之深為年兄也夫弟輩半生苦心僅獲一第而兄年未二十亦遂得第且名聲藉藉反勝弟輩此造化所忌也年伯若不用惡辣鉗錘則兄必恣情任意福壽俱損矣士乃醒悟歸時頓改舊觀父訝問之汝為自解我意能如此改過耶抑誰向汝說破耶士述同年語以對父乃敦請同年公命士禮之為師以受切磋琢磨之益和州有一居民忘其姓養鵝百餘隻偶一日鵝食其親鄰稻穀鄰打殺其鵝至五十餘民婦見之始亦甚怒次深思曰我設欲與成訟力能勝彼但須費數十金計鵝所直不及其半且鵝雖死亦尚可用何必爭此空氣又吾夫今已醉臥設與知之或起敺打尤為不便遂命僮收拾死鵞醃之次早鄰人忽自暴死其夫醉醒歎訝其人無病而卒甚為奇異婦乃以昨事告之夫深感曰設汝昨為我說我乘醉力必敺打之不幾成人命乎乃集親友作證拜謝其婦已上二事釋成泰說池州府殷家滙經紀行有一棉花客往鄉收花途遇打狗者負一大犬買歸放生剩食飼之弗離左右一日至丁家洲收花行主人叫舟送之犬亦隨往舟子見客銀多起不良心撐至江邊將客置布袋中結口投水犬遂下水口銜袋結嘶吠不已漁人見而挽出客因得蘇回至行中備言其事行主安慰客心佯為不知往舟子家探問客信且邀舟子到行飲酒乃令客出面詰伏罪奉還原銀九華山有住莊人好殺鹿一日率眾網鹿見有老鹿身斑異色四圍覓之鹿見勢迫竄入莊家眾復趕進鹿跪伏淚下乞命莊人以矛逆刺鹿目鹿未去皮而莊人眼忽先瞎矣青陽縣老田吳六房有家人名吳毛持戒茹素甚潔左兵渡江搶虜殺人主人盡走避之惟吳毛代主看守房屋被賊七鎗而死頃之厥弟來看毛復醒向弟曰我夙業應七受猪身因齋戒力今受七鎗以酬往因徑生天矣言訖遂逝其弟素不信善聞之駭然亦遂回心九華山㵎多產石雞形似蝦蟆而大味勝家雞每有上司過縣必票取之偶一夜莊人以火照巖舒手探取被石雞咬住兩手死不可直至五更聞寺鐘聲石雞各似合掌念佛之狀莊人乃得脫走池州府有一人恒誦三官經流賊臨城其人夢三官告云汝前世曾殺一人今來報讐不可免矣驚懼而醒復加懇禱又得夢云往業難逃豈能曲救但汝夙冤名朱七騎紅馬明日必來汝可跪於門前口稱朱七將軍饒命彼或問汝何故知我名字即以兩夢告之可也次日果於門前見有騎紅馬者跪稱朱七將軍饒命賊聞驚異問知其故遂憮然若失置之不殺而去釋復禮訪知友歸九華夜夢黃冠羽流三人奔求救命旁有同衣詆之次日行路見一童子手提三鱔肥大異常買放井中旁有一釋痛加訶罵謂不宜放入於井方悟夜夢即此三鱔云已上六事俱釋隆仁說徽州商人程伯鱗久居揚州事觀音大士甚虔乙酉夏北兵破揚城程禱大士求救乃得夢云汝家共十七人餘十六口俱不在劫惟汝在數不可逃也程既醒又復懇禱仍得夢云汝前生殺王麻子二十六刀今須償彼決不可逃汝當分付家中十六口並住東廂汝獨在中堂俟之勿併遺累家人也程頷之越五日北兵扣門程即問曰汝非王麻子乎若是王麻子可來殺我二十六刀若非王麻子則本無怨不須進門兵云我正是王麻子程遂開門納之兵下馬驚問汝何以知我姓名程具以兩夢告之兵歎曰汝前世殺我二十六刀我則今世報汝我今殺汝汝於來世不將又報我乎乃以刀背斫程二十六下而宥之擕其家屬同至金陵
